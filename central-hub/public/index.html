<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-DNNS Central Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Dynamic Background */
        .bg-shapes {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            overflow: hidden;
            z-index: -1;
            background: linear-gradient(125deg, #0f172a, #1a1025);
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out alternate;
        }
        .shape-1 { background: #3b82f6; width: 400px; height: 400px; top: -10%; left: -10%; animation-delay: 0s; }
        .shape-2 { background: #8b5cf6; width: 500px; height: 500px; bottom: -10%; right: -10%; animation-delay: -5s; }
        .shape-3 { background: #06b6d4; width: 300px; height: 300px; top: 40%; left: 60%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        /* Glass Panel */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .glass-panel:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Typography & Utilities */
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .text-sm { font-size: 13px; }
        .text-muted { color: var(--text-secondary); }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 8px; }
        .gap-4 { gap: 16px; }
        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }

        /* Buttons */
        .btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: var(--accent-color); border-color: var(--accent-color); }
        .btn-primary:hover:not(:disabled) { background: var(--accent-hover); box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
        .btn-success { background: var(--success); border-color: var(--success); }
        .btn-success:hover:not(:disabled) { filter: brightness(1.1); box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .btn-danger { background: var(--danger); border-color: var(--danger); }
        .btn-danger:hover:not(:disabled) { filter: brightness(1.1); box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .btn-sm { padding: 4px 10px; font-size: 12px; }

        /* Status & Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
        }
        .badge.success { color: #34d399; background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); }
        .badge.warning { color: #fbbf24; background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.2); }
        .badge.danger { color: #f87171; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); }

        /* Forms */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .form-control:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }

        /* Tables & Lists */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }
        .data-table th {
            text-align: left;
            padding: 10px 16px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .data-table td {
            background: rgba(255,255,255,0.03);
            padding: 12px 16px;
            font-size: 14px;
        }
        .data-table td:first-child { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        .data-table td:last-child { border-top-right-radius: 8px; border-bottom-right-radius: 8px; }

        /* Device & Scan Cards */
        .device-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .port-tag {
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
        }
        .port-tag.registered {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: #34d399;
        }

        /* Modals */
        .modal-backdrop {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-backdrop.show { opacity: 1; pointer-events:all; }
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            padding: 24px;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .modal-backdrop.show .modal { transform: translateY(0); }

        /* Timeline (Changelog) */
        .timeline { margin-top: 10px; padding-left: 10px; }
        .timeline-item { position: relative; padding-bottom: 20px; padding-left: 20px; border-left: 2px solid rgba(255,255,255,0.1); }
        .timeline-item:last-child { border-left: 2px solid transparent; }
        .timeline-dot { position: absolute; left: -6px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent-color); }
        .timeline-time { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .timeline-content { font-size: 14px; }
        
        /* Loading Spinner */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
        
        /* Toast Notifications */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div id="toast-container"></div>

    <div class="container">
        <!-- Header -->
        <header class="glass-panel" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 30px;">
            <div>
                <h1>⚡ Auto-DNNS</h1>
                <p class="text-sm text-muted mt-2">下一代基础设施自动化控制枢纽</p>
            </div>
            <div class="flex gap-2">
                <button class="btn btn-primary" onclick="apiCall('/api/sync/full', 'POST', '完整同步')">🚀 完整同步</button>
                <button class="btn btn-danger" onclick="purgeRemote()">☢️ 清空远端数据库</button>
            </div>
        </header>

        <!-- Stats Overview & Global Config -->
        <div class="grid-2">
            <!-- Systems Status -->
            <div class="glass-panel">
                <h2>📊 系统状态</h2>
                <div class="flex flex-col gap-4 mt-4">
                    <div class="flex justify-between items-center">
                        <span class="text-muted">路由 DDNS</span>
                        <span class="badge success" id="status-ddns">检测中</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-muted">Lucky 反代</span>
                        <span class="badge success" id="status-lucky">检测中</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-muted">SunPanel 面板</span>
                        <span class="badge success" id="status-sunpanel">检测中</span>
                    </div>
                </div>
            </div>

            <!-- Global Proxy Configs -->
            <div class="glass-panel">
                <div class="flex justify-between items-center mb-4">
                    <h2>⚙️ 全局反代参数 (proxy-defaults)</h2>
                    <button class="btn btn-sm" onclick="fetchProxyDefaults()">刷新</button>
                </div>
                <form id="proxyDefaultsForm" class="grid-2" style="gap: 10px;" onsubmit="saveProxyDefaults(event)">
                    <div>
                        <label class="form-label">协议</label>
                        <input class="form-control" id="pd-protocol" value="https">
                    </div>
                    <div>
                        <label class="form-label">管理域名 (多域名逗号分隔)</label>
                        <input class="form-control" id="pd-domains" placeholder="222869.xyz">
                    </div>
                    <div>
                        <label class="form-label">Lucky 暴露端口</label>
                        <input class="form-control" id="pd-port-lucky" type="number" value="50000">
                    </div>
                    <div style="grid-column: 1 / -1; display:flex; justify-content:flex-end;">
                        <button type="submit" class="btn btn-primary btn-sm">保存设置</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Radar & Key Machines -->
        <div class="glass-panel">
            <div class="flex justify-between items-center mb-4">
                <h2>📡 智能端口雷达 & 关键机器</h2>
                <div class="flex gap-2">
                    <button class="btn" onclick="fetchKeyMachines()">刷新设备</button>
                    <button class="btn btn-primary" onclick="scanAllKeyMachines()">全网深层端口扫描</button>
                </div>
            </div>
            <p class="text-sm text-muted mb-4">自动探索基础设施，快速将本地应用加入白名单代理网络。</p>
            
            <div id="keyMachinesArea" class="grid-3">
                <!-- Data injected via JS -->
                <div class="text-muted text-sm">加载中...</div>
            </div>
        </div>

        <!-- Services Whitelist -->
        <div class="glass-panel">
            <div class="flex justify-between items-center mb-4">
                <h2>🛡️ 服务白名单网络</h2>
                <div class="flex gap-2">
                    <button class="btn" onclick="checkConnectivity()">⚡ 连通性测速</button>
                    <button class="btn btn-primary" onclick="openAddServiceModal()">+ 手动添加服务</button>
                </div>
            </div>
            
            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>状态</th>
                            <th>服务ID</th>
                            <th>设备:端口</th>
                            <th>IPv4 域名映射 (外网)</th>
                            <th>IPv6 直连通道 (直连)</th>
                            <th>测速延时</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="servicesTableBody">
                        <!-- Data injected via JS -->
                        <tr><td colspan="7" class="text-muted text-sm" style="text-align:center;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Externals & Changelog -->
        <div class="grid-2">
            <!-- Bookmarks -->
            <div class="glass-panel">
                <div class="flex justify-between items-center mb-4">
                    <h2>⭐ 外部书签同步</h2>
                    <button class="btn btn-sm" onclick="apiCall('/api/bookmarks/sync', 'POST', '书签同步')">同步到面板</button>
                </div>
                <form id="addBookmarkForm" class="flex gap-2 mb-4" onsubmit="addBookmark(event)">
                    <input class="form-control" id="bm-title" placeholder="名称" required style="width:30%">
                    <input class="form-control" id="bm-url" placeholder="URL" required>
                    <button type="submit" class="btn btn-success">+</button>
                </form>
                <div id="bookmarksList" class="flex flex-col gap-2"></div>
            </div>

            <!-- Changelog -->
            <div class="glass-panel">
                <div class="flex justify-between items-center mb-4">
                    <h2>📜 配置变更审计 (Changelog)</h2>
                    <button class="btn btn-sm" onclick="fetchChangelog()">刷新</button>
                </div>
                <div class="timeline" id="changelogList" style="max-height: 300px; overflow-y: auto;">
                    <!-- Data injected via JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <!-- Quick Add Modal -->
    <div class="modal-backdrop" id="quickAddModal">
        <div class="modal">
            <h2 class="mb-4">✨ 快速注册白名单服务</h2>
            <form onsubmit="submitQuickAdd(event)">
                <input type="hidden" id="qa-deviceId">
                <input type="hidden" id="qa-port">
                
                <div class="form-group">
                    <label class="form-label">机器与端口</label>
                    <div class="form-control" id="qa-target-display" style="opacity:0.7"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">服务标识 (英文ID, 生成域名前缀)</label>
                    <input class="form-control" id="qa-id" placeholder="如: nas-web" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">服务展示名称</label>
                    <input class="form-control" id="qa-name" placeholder="如: 群晖控制台" required>
                </div>
                
                <div class="flex justify-between mt-4">
                    <button type="button" class="btn" onclick="closeModal('quickAddModal')">取消</button>
                    <button type="submit" class="btn btn-primary">一键注册并加入代理</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Utilities
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<div class="flex items-center gap-2">
                <span>${type === 'success' ? '✅' : '❌'}</span>
                <span>${message}</span>
            </div>`;
            document.getElementById('toast-container').appendChild(toast);
            
            // Trigger reflow
            toast.offsetHeight;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function apiCall(endpoint, method = 'GET', actionName = '', body = null) {
            try {
                const options = { method, headers: { 'Content-Type': 'application/json' } };
                if (body) options.body = JSON.stringify(body);
                
                const res = await fetch(endpoint, options);
                let data = {};
                try { data = await res.json(); } catch(e){}
                
                if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
                
                if (['POST', 'PUT', 'DELETE'].includes(method) && actionName) {
                    showToast(`${actionName} 成功`);
                    refreshAll();
                }
                return data;
            } catch (err) {
                console.error(err);
                if (actionName) showToast(`${actionName} 失败: ${err.message}`, 'error');
                throw err;
            }
        }

        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        function openModal(id) { document.getElementById(id).classList.add('show'); }

        // Data Fetching
        async function fetchSystemStatus() {
            try {
                const data = await apiCall('/api/dashboard/overview');
                const updateStatus = (id, valid, text) => {
                    const el = document.getElementById(id);
                    el.className = `badge ${valid ? 'success' : 'danger'}`;
                    el.textContent = text;
                };
                
                updateStatus('status-ddns', data.ddns?.enabled, data.ddns?.enabled ? '激活' : '未激活');
                updateStatus('status-lucky', true, `共 ${data.proxies?.lucky || 0} 条规则`);
                updateStatus('status-sunpanel', true, `卡片数: ${data.sunpanel?.cardsCount || 0}`);
            } catch(e){}
        }

        async function fetchProxyDefaults() {
            const data = await apiCall('/api/services/proxy-defaults');
            if(data) {
                document.getElementById('pd-protocol').value = data.protocol || 'https';
                document.getElementById('pd-domains').value = (data.domains || []).join(', ');
                document.getElementById('pd-port-lucky').value = data.externalPorts?.lucky || 50000;
            }
        }

        async function saveProxyDefaults(e) {
            e.preventDefault();
            const domains = document.getElementById('pd-domains').value.split(',').map(d=>d.trim()).filter(Boolean);
            const payload = {
                protocol: document.getElementById('pd-protocol').value,
                domains,
                externalPorts: {
                    lucky: parseInt(document.getElementById('pd-port-lucky').value) || 50000
                }
            };
            await apiCall('/api/services/proxy-defaults', 'PUT', '保存代理默认配置', payload);
        }

        async function fetchKeyMachines() {
            const machines = await apiCall('/api/devices/key-machines');
            const html = machines.map(m => `
                <div class="device-card">
                    <div class="flex justify-between items-center">
                        <div>
                            <div style="font-weight: 600; color: #fff;">${m.name}</div>
                            <div class="text-sm text-muted mt-1">${m.ipv4}</div>
                        </div>
                        <button class="btn btn-sm btn-primary" onclick="scanDevice('${m.id}')">扫描端口</button>
                    </div>
                    ${m.ipv6 ? `<div class="text-sm text-muted" style="word-break: break-all;">[${m.ipv6}]</div>` : ''}
                    <div id="scan-res-${m.id}" class="flex gap-2 mt-2" style="flex-wrap: wrap;"></div>
                </div>
            `).join('');
            document.getElementById('keyMachinesArea').innerHTML = html;
        }

        async function scanDevice(deviceId) {
            const resArea = document.getElementById(`scan-res-${deviceId}`);
            resArea.innerHTML = `<div class="spinner"></div><span class="text-sm text-muted">深层探测中...</span>`;
            try {
                const data = await apiCall(`/api/devices/${deviceId}/scan`, 'POST');
                if(!data.openPorts || data.openPorts.length === 0) {
                    resArea.innerHTML = `<span class="text-sm" style="color:#a8b2c1;">全网静默，无暴露端口</span>`;
                    return;
                }
                
                resArea.innerHTML = data.openPorts.map(p => {
                    if(p.isRegistered) {
                         return `<span class="port-tag registered" title="服务已注册: ${p.registeredService}">:${p.port} ✓</span>`;
                    } else {
                         return `<div class="port-tag" style="cursor:pointer" onclick="prepareQuickAdd('${deviceId}', ${p.port}, '${data.deviceName}', '${data.ipv4}')" title="点击一键注册">${p.protocol} :${p.port} <span style="font-weight:bold;margin-left:4px">+</span></div>`;
                    }
                }).join('');
            } catch(e) {
                resArea.innerHTML = `<span class="text-sm text-danger">扫描失败</span>`;
            }
        }
        
        async function scanAllKeyMachines() {
            try {
                // Fetch list first
                const machines = await apiCall('/api/devices/key-machines');
                showToast(`开始对 ${machines.length} 台关键设备进行雷达探测...`);
                for(const m of machines) {
                    await scanDevice(m.id);
                }
            } catch(e){}
        }

        function prepareQuickAdd(deviceId, port, deviceName, ipv4) {
            document.getElementById('qa-deviceId').value = deviceId;
            document.getElementById('qa-port').value = port;
            document.getElementById('qa-target-display').textContent = `${deviceName} (${ipv4}:${port})`;
            document.getElementById('qa-id').value = '';
            document.getElementById('qa-name').value = '';
            openModal('quickAddModal');
            document.getElementById('qa-id').focus();
        }

        async function submitQuickAdd(e) {
            e.preventDefault();
            const payload = {
                deviceId: document.getElementById('qa-deviceId').value,
                port: document.getElementById('qa-port').value,
                id: document.getElementById('qa-id').value,
                name: document.getElementById('qa-name').value
            };
            await apiCall('/api/services/quick-add', 'POST', '快速注册服务', payload);
            closeModal('quickAddModal');
        }

        async function fetchServices() {
            const services = await apiCall('/api/services/list');
            const tbody = document.getElementById('servicesTableBody');
            
            if(!services.length) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted">安全白名单完全空白，请进行网络探索或纯手动添加。</td></tr>`;
                return;
            }
            
            tbody.innerHTML = services.map(s => {
                const ipv4Url = `https://${s.proxyDomain}:50000`; // Will be mapped by defaults
                
                return `
                <tr>
                    <td><span class="badge ${s.enableProxy ? 'success' : 'warning'}"></span></td>
                    <td style="font-family:monospace; color:#93c5fd">${s.id}</td>
                    <td class="text-sm text-muted">${s.device}:${s.internalPort}</td>
                    <td>
                        <a href="${ipv4Url}" target="_blank" style="color:#a78bfa; text-decoration:none; display:block; font-size:13px;" id="link-v4-${s.id}">${s.proxyDomain}</a>
                        <div class="text-muted" style="font-size:11px;" id="latency-v4-${s.id}">-</div>
                    </td>
                    <td>
                        <a href="#" target="_blank" style="color:#a78bfa; text-decoration:none; display:none; font-size:13px;" id="link-v6-${s.id}">IPv6 直连通道</a>
                        <div class="text-muted" style="font-size:11px;" id="latency-v6-${s.id}">-</div>
                    </td>
                    <td><button class="btn btn-sm btn-danger" onclick="apiCall('/api/services/${s.id}', 'DELETE', '删除服务')">移除</button></td>
                </tr>
            `}).join('');
            
            // Do passive connectivity check silently behind scenes
            checkConnectivity(true);
        }

        async function checkConnectivity(silent = false) {
            if(!silent) showToast('开始探测服务连通性及延时...');
            const data = await apiCall('/api/services/connectivity');
            if(!data.services) return;
            
            for(const sc of data.services) {
                // Update IPv4
                const v4Span = document.getElementById(`latency-v4-${sc.id}`);
                const v4Link = document.getElementById(`link-v4-${sc.id}`);
                if(v4Span && v4Link) {
                    if(sc.ipv4Proxy.ok) {
                        v4Link.style.color = '#34d399';
                        v4Span.innerHTML = `<span style="color:#10b981">${sc.ipv4Proxy.latency}ms (HTTP ${sc.ipv4Proxy.status})</span>`;
                    } else {
                        v4Link.style.color = '#ef4444';
                        v4Span.innerHTML = `<span style="color:#ef4444">连接超时或拒绝</span>`;
                    }
                    if(sc.ipv4Proxy.url) v4Link.href = sc.ipv4Proxy.url;
                }
                
                // Update IPv6
                const v6Span = document.getElementById(`latency-v6-${sc.id}`);
                const v6Link = document.getElementById(`link-v6-${sc.id}`);
                if(v6Span && v6Link && sc.ipv6Direct.url) {
                    v6Link.style.display = 'block';
                    v6Link.href = sc.ipv6Direct.url;
                    
                    if(sc.ipv6Direct.ok) {
                        v6Link.style.color = '#34d399';
                        v6Span.innerHTML = `<span style="color:#10b981">${sc.ipv6Direct.latency}ms (HTTP ${sc.ipv6Direct.status})</span>`;
                    } else {
                        v6Link.style.color = '#ef4444';
                        v6Span.innerHTML = `<span style="color:#ef4444">未通</span>`;
                    }
                } else if(v6Span) {
                    v6Span.textContent = '无 IPv6 通道';
                }
            }
        }

        async function purgeRemote() {
            if(confirm('☢️ 警告: 真的要批量清空 Lucky、SunPanel 等远端同步数据，并重置白名单系统吗？\n当前本地列表将化为灰烬！')) {
                await apiCall('/api/services/purge-remote', 'POST', '广域数据库重置');
            }
        }

        // Bookmarks
        async function fetchBookmarks() {
            const records = await apiCall('/api/bookmarks/list');
            document.getElementById('bookmarksList').innerHTML = records.map(bm => `
                <div class="flex justify-between items-center" style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px;">
                    <div>
                        <div class="text-sm" style="font-weight:600;">${bm.name} <span class="badge" style="transform:scale(0.85);">${bm.group}</span></div>
                        <div class="text-muted" style="font-size:11px; margin-top:2px;">${bm.url}</div>
                    </div>
                    <button class="btn btn-sm btn-danger" onclick="apiCall('/api/bookmarks/${bm.id}', 'DELETE', '删除书签')">X</button>
                </div>
            `).join('');
        }
        
        async function addBookmark(e) {
            e.preventDefault();
            const id = 'bm-' + Date.now();
            const payload = {
                id,
                name: document.getElementById('bm-title').value,
                url: document.getElementById('bm-url').value,
                group: '外部笔记'
            };
            await apiCall('/api/bookmarks/add', 'POST', '添加书签/笔记', payload);
            document.getElementById('bm-title').value = '';
            document.getElementById('bm-url').value = '';
        }

        // Changelog
        async function fetchChangelog() {
            const data = await apiCall('/api/changelog?limit=20');
            const html = (data.entries || []).map(entry => `
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-time">${new Date(entry.timestamp).toLocaleString('zh-CN')} - [${entry.action}]</div>
                    <div class="timeline-content" style="color: #cbd5e1; font-weight:500;">
                        ★ ${entry.detail}
                    </div>
                    ${entry.target ? `<div class="text-muted" style="font-size:11px; margin-top:4px;">标的物: ${entry.target}</div>` : ''}
                </div>
            `).join('');
            document.getElementById('changelogList').innerHTML = html || '<div class="text-muted">无历史记录。</div>';
        }

        // Init
        function refreshAll() {
            fetchSystemStatus();
            fetchProxyDefaults();
            fetchKeyMachines();
            fetchServices();
            fetchBookmarks();
            fetchChangelog();
        }

        window.onload = refreshAll;
    </script>
</body>
</html>
