<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Hub - 局域网部署自动化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-left: 10px;
        }

        .status-running {
            background: #10b981;
            color: white;
        }

        .status-stopped {
            background: #ef4444;
            color: white;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-icon {
            font-size: 24px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .stat:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
        }

        .stat-value {
            font-weight: bold;
            color: #333;
        }

        .section-card {
            margin-bottom: 20px;
        }

        .section-description {
            margin-bottom: 15px;
        }

        .service-form-actions {
            margin-top: 16px;
        }

        .device-list {
            margin-top: 15px;
        }

        .device-item {
            background: #f9fafb;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid #10b981;
        }

        .device-item.no-ipv6 {
            border-left-color: #ef4444;
        }

        .device-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .device-info {
            font-size: 14px;
            color: #666;
        }

        .actions {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .actions h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: background 0.3s;
        }

        .button:hover {
            background: #5568d3;
        }

        .button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .button-secondary {
            background: #10b981;
        }

        .button-secondary:hover {
            background: #059669;
        }

        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 5px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .services-layout {
            display: grid;
            grid-template-columns: minmax(320px, 380px) minmax(0, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-field.full-width {
            grid-column: 1 / -1;
        }

        .form-field label {
            color: #555;
            font-size: 14px;
            font-weight: 600;
        }

        .form-field input,
        .form-field select,
        .form-field textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 10px 12px;
            font: inherit;
            background: white;
        }

        .form-field textarea {
            min-height: 88px;
            resize: vertical;
        }

        .checkbox-field {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-top: 26px;
        }

        .services-toolbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .services-summary {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .summary-pill {
            background: #f3f4f6;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 13px;
            color: #374151;
        }

        .service-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .service-item {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 14px;
            background: #f9fafb;
        }

        .service-item-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .service-item-title {
            font-weight: 700;
            color: #111827;
            margin-bottom: 4px;
        }

        .service-item-subtitle {
            font-size: 13px;
            color: #6b7280;
            word-break: break-all;
        }

        .service-item-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 8px;
            font-size: 13px;
            color: #4b5563;
            margin-bottom: 12px;
        }

        .service-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .button-danger {
            background: #ef4444;
        }

        .button-danger:hover {
            background: #dc2626;
        }

        .button-small {
            padding: 8px 14px;
            font-size: 13px;
        }

        .muted-text {
            color: #6b7280;
            font-size: 13px;
        }

        .validation-errors {
            margin-top: 12px;
            padding: 12px 14px;
            border-radius: 6px;
            background: #fff7ed;
            color: #9a3412;
            font-size: 13px;
        }

        .validation-errors ul {
            margin: 8px 0 0 18px;
        }

        .last-update {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }

        @media (max-width: 960px) {
            .services-layout {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                🚀 Central Hub
                <span class="status-badge" id="coordinatorStatus">加载中...</span>
            </h1>
            <p>局域网对外部署自动化管理平台</p>
        </div>

        <div id="messageArea"></div>

        <div class="dashboard">
            <div class="card">
                <h2><span class="card-icon">📡</span>设备监控</h2>
                <div class="stat">
                    <span class="stat-label">设备总数</span>
                    <span class="stat-value" id="deviceTotal">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">IPv6就绪</span>
                    <span class="stat-value" id="deviceIPv6Ready">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">最后更新</span>
                    <span class="stat-value" id="deviceLastUpdate">-</span>
                </div>
            </div>

            <div class="card">
                <h2><span class="card-icon">🌐</span>反向代理</h2>
                <div class="stat">
                    <span class="stat-label">Lucky (50000)</span>
                    <span class="stat-value" id="luckyProxies">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">NPM 实际代理</span>
                    <span class="stat-value" id="npmProxies">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">NPM 已同步</span>
                    <span class="stat-value" id="npmSynced">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">NPM 鉴权</span>
                    <span class="stat-value" id="npmAuthMode">-</span>
                </div>
            </div>

            <div class="card">
                <h2><span class="card-icon">🌞</span>SunPanel</h2>
                <div class="stat">
                    <span class="stat-label">卡片数量</span>
                    <span class="stat-value" id="sunpanelCards">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">最后同步</span>
                    <span class="stat-value" id="sunpanelLastSync">-</span>
                </div>
            </div>

            <div class="card">
                <h2><span class="card-icon">🌍</span>DDNS</h2>
                <div class="stat">
                    <span class="stat-label">状态</span>
                    <span class="stat-value" id="ddnsStatus">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">最后更新</span>
                    <span class="stat-value" id="ddnsLastUpdate">-</span>
                </div>
            </div>
        </div>

        <div class="card section-card">
            <h2><span class="card-icon">📱</span>设备列表</h2>
            <div id="deviceList" class="device-list">加载中...</div>
        </div>

        <div class="services-layout">
            <div class="card">
                <h2><span class="card-icon">🛠️</span>服务管理</h2>
                <p class="muted-text section-description">统一维护 Lucky / NPM / SunPanel 的服务源数据。</p>
                <form id="serviceForm">
                    <div class="form-grid">
                        <div class="form-field">
                            <label for="serviceId">服务 ID</label>
                            <input id="serviceId" name="id" placeholder="例如 nas200-web" required>
                        </div>
                        <div class="form-field">
                            <label for="serviceName">服务名称</label>
                            <input id="serviceName" name="name" placeholder="例如 飞牛OS Web界面" required>
                        </div>
                        <div class="form-field">
                            <label for="serviceDevice">设备 ID</label>
                            <input id="serviceDevice" name="device" placeholder="例如 200" required>
                        </div>
                        <div class="form-field">
                            <label for="servicePort">内部端口</label>
                            <input id="servicePort" name="internalPort" type="number" min="1" max="65535" placeholder="443" required>
                        </div>
                        <div class="form-field full-width">
                            <label for="serviceDomain">代理域名</label>
                            <input id="serviceDomain" name="proxyDomain" placeholder="例如 nas200.leecaiy.shop" required>
                        </div>
                        <div class="form-field">
                            <label for="serviceProxyType">代理类型</label>
                            <input id="serviceProxyType" name="proxyType" value="reverseproxy">
                        </div>
                        <div class="form-field">
                            <label for="serviceLuckyRemark">Lucky 备注</label>
                            <input id="serviceLuckyRemark" name="luckyRemark" placeholder="默认跟随服务名称">
                        </div>
                        <div class="form-field">
                            <label for="serviceSunpanelGroup">SunPanel 分组</label>
                            <input id="serviceSunpanelGroup" name="sunpanelGroup" placeholder="例如 NAS">
                        </div>
                        <div class="form-field full-width">
                            <label for="serviceDescription">描述</label>
                            <textarea id="serviceDescription" name="description" placeholder="服务描述"></textarea>
                        </div>
                        <div class="form-field full-width">
                            <label for="serviceSunpanelIcon">SunPanel 图标</label>
                            <input id="serviceSunpanelIcon" name="sunpanelIcon" placeholder="例如 https://nas200.leecaiy.shop/favicon.ico">
                        </div>
                        <div class="form-field full-width">
                            <label for="serviceSunpanelLanUrl">SunPanel 局域网地址</label>
                            <input id="serviceSunpanelLanUrl" name="sunpanelLanUrl" placeholder="例如 https://192.168.3.200:443">
                        </div>
                        <div class="checkbox-field">
                            <input id="serviceEnableProxy" name="enableProxy" type="checkbox" checked>
                            <label for="serviceEnableProxy">启用代理</label>
                        </div>
                        <div class="checkbox-field">
                            <input id="serviceEnableTLS" name="enableTLS" type="checkbox">
                            <label for="serviceEnableTLS">启用 TLS</label>
                        </div>
                    </div>
                    <div class="service-actions service-form-actions">
                        <button class="button button-secondary" type="submit" id="serviceSubmitButton">新增服务</button>
                        <button class="button" type="button" onclick="validateCurrentService()">校验配置</button>
                        <button class="button" type="button" onclick="resetServiceForm()">重置表单</button>
                    </div>
                    <div id="serviceValidationArea"></div>
                </form>
            </div>

            <div class="card">
                <div class="services-toolbar">
                    <h2><span class="card-icon">📦</span>服务清单</h2>
                    <button class="button" type="button" onclick="loadServices(true)">刷新服务</button>
                </div>
                <div class="services-summary">
                    <span class="summary-pill">总服务: <strong id="servicesSummaryTotal">-</strong></span>
                    <span class="summary-pill">启用代理: <strong id="servicesSummaryProxied">-</strong></span>
                    <span class="summary-pill">最后更新: <strong id="servicesSummaryUpdated">-</strong></span>
                </div>
                <div id="serviceList" class="service-list">加载中...</div>
            </div>
        </div>

        <div class="actions">
            <h2>🎮 操作</h2>
            <button class="button" type="button" onclick="refreshStatus()">🔄 刷新状态</button>
            <button class="button button-secondary" type="button" onclick="runFullSync()">⚡ 完整同步</button>
            <button class="button" type="button" onclick="runDeviceMonitor()">📡 设备监控</button>
            <button class="button" type="button" onclick="runLuckySync()">🎲 Lucky同步</button>
            <button class="button" type="button" onclick="runNPMSync()">📋 NPM同步</button>
            <button class="button" type="button" onclick="runSunpanelSync()">🌞 SunPanel同步</button>
        </div>

        <div class="last-update">
            页面最后更新: <span id="pageLastUpdate">-</span>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const serviceFormState = {
            editingId: null,
            services: []
        };

        function formatTime(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN');
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function showMessage(message, type = 'info') {
            const messageArea = document.getElementById('messageArea');
            const className = type === 'error' ? 'error-message' : 'success-message';
            messageArea.innerHTML = `<div class="${className}">${message}</div>`;
            setTimeout(() => {
                messageArea.innerHTML = '';
            }, 5000);
        }

        function getActionMessage(actionName, result) {
            const payload = result?.result || result || {};
            const failed = Array.isArray(payload.failedSteps) ? payload.failedSteps.length : 0;
            const hasPartialFailure = failed > 0 || payload.success === false || ((typeof payload.failed === 'number') && payload.failed > 0);

            if (hasPartialFailure) {
                if (failed > 0) {
                    return {
                        type: 'error',
                        text: `${actionName}完成，但有失败步骤：${payload.failedSteps.join('、')}`
                    };
                }

                return {
                    type: 'error',
                    text: `${actionName}未完全成功`
                };
            }

            const completed = typeof payload.completed === 'number' ? `，完成 ${payload.completed} 项` : '';
            return {
                type: 'success',
                text: `${actionName}完成${completed}`
            };
        }

        function setValidationResult(validation, fallbackMessage = '配置校验通过') {
            const area = document.getElementById('serviceValidationArea');
            if (validation.valid) {
                area.innerHTML = `<div class="success-message">${fallbackMessage}</div>`;
                return;
            }

            area.innerHTML = `
                <div class="validation-errors">
                    <strong>配置校验失败</strong>
                    <ul>${validation.errors.map(error => `<li>${escapeHtml(error)}</li>`).join('')}</ul>
                </div>
            `;
        }

        function clearValidationResult() {
            document.getElementById('serviceValidationArea').innerHTML = '';
        }

        function getServicePayloadFromForm() {
            return {
                id: document.getElementById('serviceId').value.trim(),
                name: document.getElementById('serviceName').value.trim(),
                device: document.getElementById('serviceDevice').value.trim(),
                internalPort: Number(document.getElementById('servicePort').value),
                proxyDomain: document.getElementById('serviceDomain').value.trim(),
                proxyType: document.getElementById('serviceProxyType').value.trim() || 'reverseproxy',
                enableProxy: document.getElementById('serviceEnableProxy').checked,
                enableTLS: document.getElementById('serviceEnableTLS').checked,
                description: document.getElementById('serviceDescription').value.trim(),
                lucky: {
                    remark: document.getElementById('serviceLuckyRemark').value.trim()
                },
                sunpanel: {
                    group: document.getElementById('serviceSunpanelGroup').value.trim(),
                    icon: document.getElementById('serviceSunpanelIcon').value.trim(),
                    lanUrl: document.getElementById('serviceSunpanelLanUrl').value.trim()
                }
            };
        }

        function fillServiceForm(service) {
            serviceFormState.editingId = service.id;
            document.getElementById('serviceId').value = service.id || '';
            document.getElementById('serviceId').disabled = true;
            document.getElementById('serviceName').value = service.name || '';
            document.getElementById('serviceDevice').value = service.device || '';
            document.getElementById('servicePort').value = service.internalPort || '';
            document.getElementById('serviceDomain').value = service.proxyDomain || '';
            document.getElementById('serviceProxyType').value = service.proxyType || 'reverseproxy';
            document.getElementById('serviceLuckyRemark').value = service.lucky?.remark || '';
            document.getElementById('serviceSunpanelGroup').value = service.sunpanel?.group || '';
            document.getElementById('serviceDescription').value = service.description || '';
            document.getElementById('serviceSunpanelIcon').value = service.sunpanel?.icon || '';
            document.getElementById('serviceSunpanelLanUrl').value = service.sunpanel?.lanUrl || '';
            document.getElementById('serviceEnableProxy').checked = Boolean(service.enableProxy);
            document.getElementById('serviceEnableTLS').checked = Boolean(service.enableTLS);
            document.getElementById('serviceSubmitButton').textContent = '保存修改';
            clearValidationResult();
        }

        function resetServiceForm() {
            document.getElementById('serviceForm').reset();
            document.getElementById('serviceId').disabled = false;
            document.getElementById('serviceEnableProxy').checked = true;
            document.getElementById('serviceProxyType').value = 'reverseproxy';
            document.getElementById('serviceSubmitButton').textContent = '新增服务';
            serviceFormState.editingId = null;
            clearValidationResult();
        }

        async function requestJson(url, options = {}) {
            const response = await fetch(url, {
                headers: {
                    'Content-Type': 'application/json',
                    ...(options.headers || {})
                },
                ...options
            });

            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
                const details = Array.isArray(data.details) && data.details.length
                    ? `：${data.details.join('；')}`
                    : '';
                throw new Error(`${data.error || '请求失败'}${details}`);
            }

            return data;
        }

        async function refreshStatus() {
            try {
                const data = await requestJson(`${API_BASE}/dashboard/overview`, { headers: {} });

                const coordinatorStatus = document.getElementById('coordinatorStatus');
                if (data.coordinator.isRunning) {
                    coordinatorStatus.textContent = '运行中';
                    coordinatorStatus.className = 'status-badge status-running';
                } else {
                    coordinatorStatus.textContent = '已停止';
                    coordinatorStatus.className = 'status-badge status-stopped';
                }

                document.getElementById('deviceTotal').textContent = data.devices.total;
                document.getElementById('deviceIPv6Ready').textContent = data.devices.ipv6Ready;
                document.getElementById('deviceLastUpdate').textContent = formatTime(data.devices.lastUpdate);
                document.getElementById('luckyProxies').textContent = data.proxies.lucky;
                document.getElementById('npmProxies').textContent = data.proxies.npm;
                document.getElementById('npmSynced').textContent = data.proxies.npmSynced ?? 0;
                document.getElementById('npmAuthMode').textContent = data.proxies.npmAuthMode || 'none';
                document.getElementById('servicesSummaryTotal').textContent = data.services.total ?? 0;
                document.getElementById('servicesSummaryProxied').textContent = data.services.proxied ?? 0;
                document.getElementById('sunpanelCards').textContent = data.sunpanel.cardsCount;
                document.getElementById('sunpanelLastSync').textContent = formatTime(data.sunpanel.lastSync);
                document.getElementById('ddnsStatus').textContent = data.ddns.enabled ? '启用' : '禁用';
                document.getElementById('ddnsLastUpdate').textContent = formatTime(data.ddns.lastUpdate);
                document.getElementById('pageLastUpdate').textContent = new Date().toLocaleString('zh-CN');

                await Promise.all([loadDeviceList(), loadServices()]);
            } catch (error) {
                console.error('刷新状态失败:', error);
                showMessage('刷新状态失败: ' + error.message, 'error');
            }
        }

        async function loadDeviceList() {
            try {
                const devices = await requestJson(`${API_BASE}/devices/list`, { headers: {} });
                const deviceList = document.getElementById('deviceList');

                if (!devices.length) {
                    deviceList.innerHTML = '<p>暂无设备</p>';
                    return;
                }

                deviceList.innerHTML = devices.map(device => `
                    <div class="device-item ${!device.ipv6 ? 'no-ipv6' : ''}">
                        <div class="device-name">${escapeHtml(device.ipv4)} ${device.ipv6 ? '✅' : '❌'}</div>
                        <div class="device-info">
                            IPv6: ${escapeHtml(device.ipv6 || '未找到')}<br>
                            MAC: ${escapeHtml(device.mac || '未知')}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载设备列表失败:', error);
            }
        }

        function renderServices(services) {
            const list = document.getElementById('serviceList');
            if (!services.length) {
                list.innerHTML = '<p>暂无服务，请先新增。</p>';
                return;
            }

            list.innerHTML = services.map(service => `
                <div class="service-item">
                    <div class="service-item-header">
                        <div>
                            <div class="service-item-title">${escapeHtml(service.name)}</div>
                            <div class="service-item-subtitle">${escapeHtml(service.id)} · ${escapeHtml(service.proxyDomain)}</div>
                        </div>
                        <div class="muted-text">${service.enableProxy ? '代理已启用' : '代理关闭'}</div>
                    </div>
                    <div class="service-item-meta">
                        <div>设备: ${escapeHtml(service.device)}</div>
                        <div>端口: ${escapeHtml(service.internalPort)}</div>
                        <div>TLS: ${service.enableTLS ? '开启' : '关闭'}</div>
                        <div>分组: ${escapeHtml(service.sunpanel?.group || '未设置')}</div>
                    </div>
                    <div class="service-actions">
                        <button class="button button-small" type="button" onclick="editService('${escapeHtml(service.id)}')">编辑</button>
                        <button class="button button-small button-danger" type="button" onclick="deleteService('${escapeHtml(service.id)}')">删除</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadServices(showToast = false) {
            try {
                const [services, status] = await Promise.all([
                    requestJson(`${API_BASE}/services/list`, { headers: {} }),
                    requestJson(`${API_BASE}/services/status`, { headers: {} })
                ]);

                serviceFormState.services = services;
                document.getElementById('servicesSummaryTotal').textContent = status.totalServices ?? services.length;
                document.getElementById('servicesSummaryProxied').textContent = status.proxiedServices ?? services.filter(service => service.enableProxy).length;
                document.getElementById('servicesSummaryUpdated').textContent = formatTime(status.lastUpdate);
                renderServices(services);

                if (showToast) {
                    showMessage('服务列表已刷新', 'success');
                }
            } catch (error) {
                console.error('加载服务列表失败:', error);
                document.getElementById('serviceList').innerHTML = `<p>加载失败：${escapeHtml(error.message)}</p>`;
                if (showToast) {
                    showMessage('加载服务列表失败: ' + error.message, 'error');
                }
            }
        }

        function editService(id) {
            const service = serviceFormState.services.find(item => item.id === id);
            if (!service) {
                showMessage(`未找到服务 ${id}`, 'error');
                return;
            }

            fillServiceForm(service);
            window.scrollTo({ top: document.getElementById('serviceForm').offsetTop - 20, behavior: 'smooth' });
        }

        async function deleteService(id) {
            if (!window.confirm(`确认删除服务 ${id} 吗？`)) {
                return;
            }

            try {
                await requestJson(`${API_BASE}/services/${encodeURIComponent(id)}`, {
                    method: 'DELETE'
                });
                if (serviceFormState.editingId === id) {
                    resetServiceForm();
                }
                showMessage(`服务 ${id} 已删除`, 'success');
                await refreshStatus();
            } catch (error) {
                console.error('删除服务失败:', error);
                showMessage('删除服务失败: ' + error.message, 'error');
            }
        }

        async function validateCurrentService() {
            try {
                const validation = await requestJson(`${API_BASE}/services/validate`, {
                    method: 'POST',
                    body: JSON.stringify(getServicePayloadFromForm())
                });
                setValidationResult(validation);
            } catch (error) {
                console.error('校验服务失败:', error);
                showMessage('校验服务失败: ' + error.message, 'error');
            }
        }

        async function submitServiceForm(event) {
            event.preventDefault();

            const payload = getServicePayloadFromForm();
            const isEditing = Boolean(serviceFormState.editingId);
            const url = isEditing
                ? `${API_BASE}/services/${encodeURIComponent(serviceFormState.editingId)}`
                : `${API_BASE}/services/add`;
            const method = isEditing ? 'PUT' : 'POST';

            try {
                const result = await requestJson(url, {
                    method,
                    body: JSON.stringify(payload)
                });
                setValidationResult({ valid: true, errors: [] }, isEditing ? '服务更新成功' : '服务新增成功');
                showMessage(isEditing ? `服务 ${result.service.id} 已更新` : `服务 ${result.service.id} 已新增`, 'success');
                resetServiceForm();
                await refreshStatus();
            } catch (error) {
                console.error('保存服务失败:', error);
                clearValidationResult();
                showMessage('保存服务失败: ' + error.message, 'error');
            }
        }

        async function runFullSync() {
            try {
                showMessage('正在执行完整同步...', 'info');
                const result = await requestJson(`${API_BASE}/sync/full`, { method: 'POST' });
                const message = getActionMessage('完整同步', result);
                showMessage(message.text, message.type);
                await refreshStatus();
            } catch (error) {
                console.error('完整同步失败:', error);
                showMessage('完整同步失败: ' + error.message, 'error');
            }
        }

        async function runDeviceMonitor() {
            try {
                showMessage('正在执行设备监控...', 'info');
                const result = await requestJson(`${API_BASE}/devices/refresh`, { method: 'POST' });
                const message = getActionMessage('设备监控', result);
                showMessage(message.text, message.type);
                await refreshStatus();
            } catch (error) {
                console.error('设备监控失败:', error);
                showMessage('设备监控失败: ' + error.message, 'error');
            }
        }

        async function runLuckySync() {
            try {
                showMessage('正在执行Lucky同步...', 'info');
                const result = await requestJson(`${API_BASE}/proxies/sync`, { method: 'POST' });
                const message = getActionMessage('Lucky同步', result);
                showMessage(message.text, message.type);
                await refreshStatus();
            } catch (error) {
                console.error('Lucky同步失败:', error);
                showMessage('Lucky同步失败: ' + error.message, 'error');
            }
        }

        async function runNPMSync() {
            try {
                showMessage('正在执行NPM同步...', 'info');
                const result = await requestJson(`${API_BASE}/npm/sync`, { method: 'POST' });
                const message = getActionMessage('NPM同步', result);
                showMessage(message.text, message.type);
                await refreshStatus();
            } catch (error) {
                console.error('NPM同步失败:', error);
                showMessage('NPM同步失败: ' + error.message, 'error');
            }
        }

        async function runSunpanelSync() {
            try {
                showMessage('正在执行SunPanel同步...', 'info');
                const result = await requestJson(`${API_BASE}/sunpanel/sync`, { method: 'POST' });
                const message = getActionMessage('SunPanel同步', result);
                showMessage(message.text, message.type);
                await refreshStatus();
            } catch (error) {
                console.error('SunPanel同步失败:', error);
                showMessage('SunPanel同步失败: ' + error.message, 'error');
            }
        }

        window.addEventListener('load', () => {
            document.getElementById('serviceForm').addEventListener('submit', submitServiceForm);
            resetServiceForm();
            refreshStatus();
            setInterval(refreshStatus, 30000);
        });
    </script>
</body>
</html>
